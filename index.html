<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>삼사월 | 청주 동남지구 와규 브랜드</title>

<meta name="description" content="청주 동남지구 삼사월. 와규 중심 메뉴와 편안한 분위기로 방문 경험이 자연스럽게 이어지는 고깃집입니다. 매장 방문 및 창업 문의 가능합니다.">
<meta name="keywords" content="삼사월, 청주 삼사월, 동남지구 고기집, 청주 와규, 청주 맛집, 고깃집 창업, 프랜차이즈 창업">
<meta name="theme-color" content="#0a0a0a">

<meta property="og:title" content="삼사월">
<meta property="og:description" content="분위기로 머물고 기억으로 이어지는 공간">
<meta property="og:image" content="og-samsawol.jpg">

<style>
:root{
--bg:#0a0a0a;
--card:#171717;
--text:#f7f1e8;
--muted:#c9beaf;
--point:#d4a164;
--white:#fff;
}

*{box-sizing:border-box}
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR",Arial;
background:var(--bg);
color:var(--text);
}

/* ===== HEADER ===== */
header{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(12px);
z-index:1000;
}

.header{
max-width:1200px;
margin:auto;
padding:18px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav{
display:flex;
gap:20px;
}

nav a{
color:#ddd;
font-size:14px;
text-decoration:none;
}

/* ===== HERO ===== */
.hero{
height:100vh;
display:flex;
align-items:center;
position:relative;
overflow:hidden;

background:
linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.9)),
url('hero-bg.jpg') center/cover no-repeat;

animation:breath 8s ease-in-out infinite alternate;
}

@keyframes breath{
0%{background-size:100%;background-position:center;}
100%{background-size:115%;background-position:center 65%;}
}

/* 밝기 변화 */
.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(255,255,255,0.05);
animation:lightFade 5s infinite alternate;
}

@keyframes lightFade{
0%{opacity:0.05}
100%{opacity:0.3}
}

/* 움직이는 빛 */
.hero::after{
content:"";
position:absolute;
inset:0;
background:radial-gradient(circle at 30% 40%, rgba(255,255,255,0.15), transparent 50%);
animation:lightMove 6s infinite alternate;
}

@keyframes lightMove{
0%{transform:translateY(0)}
100%{transform:translateY(-40px)}
}

.hero-content{
position:relative;
z-index:2;
max-width:900px;
margin:auto;
padding:20px;
}

.hero h1{
font-size:clamp(40px,7vw,80px);
margin:0;
}

.hero p{
margin-top:20px;
color:#ddd;
line-height:1.6;
}

.btn{
display:inline-block;
margin-top:20px;
padding:14px 28px;
background:var(--point);
color:#000;
border-radius:10px;
font-weight:bold;
text-decoration:none;
}

/* ===== SECTION ===== */
section{
padding:100px 20px;
max-width:1200px;
margin:auto;
}

/* ===== GRID ===== */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.card{
background:var(--card);
border-radius:12px;
overflow:hidden;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card div{
padding:16px;
}

.price{
color:var(--point);
font-weight:bold;
}

/* ===== MOOD ===== */
.mood{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

/* ===== CTA ===== */
.cta{
background:#111;
padding:40px;
border-radius:12px;
text-align:center;
}

/* ===== CONTACT ===== */
input,textarea{
width:100%;
padding:12px;
margin:8px 0;
background:#111;
border:1px solid #333;
color:#fff;
}

/* ===== FLOAT ===== */
.float{
position:fixed;
bottom:20px;
right:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.float a{
background:#d4a164;
padding:12px;
border-radius:50px;
color:#000;
font-weight:bold;
text-decoration:none;
}

/* ===== RESPONSIVE ===== */
@media(max-width:1024px){
.grid{grid-template-columns:repeat(2,1fr)}
.mood{grid-template-columns:1fr}
}

@media(max-width:600px){
.grid{grid-template-columns:1fr}
nav{display:none}
.hero{height:90vh}
}

</style>
</head>

<body>

<header>
<div class="header">
<div>삼사월</div>
<nav>
<a href="#menu">메뉴</a>
<a href="#mood">공간</a>
<a href="#contact">문의</a>
</nav>
</div>
</header>

<!-- HERO -->
<section class="hero">
<div class="hero-content">
<h1>분위기로 머물고<br>기억으로 이어지는 공간</h1>
<p>
편안한 분위기와 안정된 메뉴 구성을 바탕으로  
방문이 자연스럽게 이어지는 고깃집입니다.
</p>
<a href="#contact" class="btn">문의하기</a>
</div>
</section>

<!-- MENU -->
<section id="menu">
<h2>대표 메뉴</h2>

<div class="grid">
<div class="card">
<img src="menu-special.jpg">
<div><h3>삼사월 스페셜</h3><p>대표 구성</p><div class="price">₩71,000</div></div>
</div>

<div class="card">
<img src="menu-galbisal.jpg">
<div><h3>갈비살</h3><p>육즙 풍부</p><div class="price">₩19,000</div></div>
</div>

<div class="card">
<img src="menu-buchaesal.jpg">
<div><h3>부채살</h3><p>부드러운 식감</p><div class="price">₩24,000</div></div>
</div>

<div class="card">
<img src="menu-doenjang.jpg">
<div><h3>된장술밥</h3><p>마무리</p><div class="price">₩6,900</div></div>
</div>
</div>
</section>

<!-- MOOD -->
<section id="mood">
<h2>공간</h2>

<div class="mood">
<div class="card"><img src="rep.jpg"><div>편안한 분위기</div></div>
<div class="card"><img src="rep.jpg"><div>모임 가능</div></div>
<div class="card"><img src="rep.jpg"><div>데이트 공간</div></div>
</div>
</section>

<!-- CTA -->
<section>
<div class="cta">
<h2>방문 및 창업 문의</h2>
<p>편하게 문의 주시면 안내드립니다.</p>
<a href="#contact" class="btn">문의하기</a>
</div>
</section>

<!-- CONTACT -->
<section id="contact">
<h2>문의</h2>

<form>
<input placeholder="성함" required>
<input placeholder="전화번호" required>
<textarea placeholder="문의 내용"></textarea>
<button class="btn">접수하기</button>
</form>
</section>

<!-- FLOAT -->
<div class="float">
<a href="tel:050713983445">전화</a>
<a href="#">카카오</a>
</div>

</body>
</html>
