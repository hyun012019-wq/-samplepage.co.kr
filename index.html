<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>브랜드 분석 리포트 | 무료 진단</title>
<meta name="description" content="내 블로그와 사이트 상태를 간단하게 확인하고 개선 방향을 확인해보세요.">
<meta name="keywords" content="블로그 분석, 사이트 분석, 검색 유입, 마케팅 진단, 무료 리포트">
<meta name="robots" content="index,follow">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif;background:#0f172a;color:#fff}
.wrap{max-width:480px;margin:0 auto;padding:20px}
h1{font-size:28px;margin-bottom:10px}
p{color:#cbd5e1;margin-bottom:20px}
.input{width:100%;padding:14px;border-radius:12px;border:none;margin-bottom:10px}
.btn{width:100%;padding:14px;border-radius:12px;border:none;font-weight:700;background:linear-gradient(90deg,#2563eb,#7c3aed);color:#fff}
.card{background:#1e293b;padding:20px;border-radius:16px;margin-top:20px}
.score{font-size:40px;font-weight:900;color:#22c55e}
.bad{color:#ef4444}
.mid{color:#facc15}
.good{color:#22c55e}
.cta{margin-top:20px;padding:16px;border-radius:12px;background:#fff;color:#000;text-align:center;font-weight:900}
</style>
</head>

<body>

<div class="wrap">

<h1>무료 분석 리포트</h1>
<p>블로그 또는 사이트 주소를 입력하면 현재 상태와 개선 방향을 확인할 수 있습니다.</p>

<input id="inputUrl" class="input" placeholder="블로그 주소 또는 사이트 입력">
<button class="btn" onclick="analyze()">분석하기</button>

<div id="result"></div>

</div>

<script>
function randomScore(min,max){
  return Math.floor(Math.random()*(max-min)+min)
}

function analyze(){
  const url = document.getElementById("inputUrl").value
  if(!url){
    alert("주소를 입력하세요")
    return
  }

  const activity = randomScore(40,95)
  const content = randomScore(30,90)
  const keyword = randomScore(20,85)

  const total = Math.floor((activity + content + keyword)/3)

  let levelClass = "bad"
  let levelText = "낮음"

  if(total > 70){ levelClass="good"; levelText="좋음"}
  else if(total > 50){ levelClass="mid"; levelText="보통"}

  const issues = []
  if(activity < 60) issues.push("최근 글 발행 주기가 불규칙합니다")
  if(content < 60) issues.push("콘텐츠 길이와 정보 밀도가 부족합니다")
  if(keyword < 60) issues.push("검색어 반영이 부족합니다")

  const resultHTML = `
  <div class="card">
    <h2>종합 점수</h2>
    <div class="score ${levelClass}">${total}점</div>
    <p>현재 상태: ${levelText}</p>
  </div>

  <div class="card">
    <h3>상세 항목</h3>
    <p>활동 점수: ${activity}</p>
    <p>콘텐츠 점수: ${content}</p>
    <p>검색 반영 점수: ${keyword}</p>
  </div>

  <div class="card">
    <h3>문제 포인트</h3>
    ${issues.map(i=>"<p>• "+i+"</p>").join("")}
  </div>

  <div class="card">
    <h3>개선 방향</h3>
    <p>• 일정한 글 발행 유지</p>
    <p>• 정보 중심 콘텐츠 작성</p>
    <p>• 검색어 자연 삽입</p>
  </div>

  <div class="cta" onclick="goConsult()">
    👉 무료 상담으로 바로 개선하기
  </div>
  `

  document.getElementById("result").innerHTML = resultHTML
}

function goConsult(){
  window.open("https://hviral.co.kr","_blank")
}
</script>

</body>
</html>
