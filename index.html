<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ToolMall | 사업주 입점 플랫폼</title>
<meta name="description" content="사업주가 입점하고 상품과 서비스를 등록하는 입점형 플랫폼">
<meta name="theme-color" content="#2563eb">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif;background:#f8fafc;color:#0f172a;padding-bottom:80px}
button,input,select,textarea{font-family:inherit}
button{border:0;cursor:pointer}
a{text-decoration:none;color:inherit}
header{position:sticky;top:0;z-index:99;background:#fff;border-bottom:1px solid #e2e8f0}
.nav{max-width:1180px;margin:0 auto;height:68px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{font-size:25px;font-weight:950;background:linear-gradient(90deg,#2563eb,#7c3aed,#ec4899);-webkit-background-clip:text;color:transparent}
.search{flex:1;max-width:520px;display:flex;gap:8px}
.search input{width:100%;padding:12px 14px;border:2px solid #2563eb;border-radius:14px}
.btn{padding:12px 16px;border-radius:14px;background:#2563eb;color:#fff;font-weight:900}
.btn.dark{background:#0f172a}
.btn.gray{background:#e2e8f0;color:#0f172a}
.wrap{max-width:1180px;margin:0 auto;padding:20px 16px}
.hero{padding:44px 20px;border-radius:30px;background:linear-gradient(135deg,#172554,#581c87,#831843);color:#fff;margin:20px 0}
.hero h1{font-size:clamp(34px,6vw,64px);line-height:1.05;letter-spacing:-.06em;margin-bottom:14px}
.hero p{color:#dbeafe;max-width:720px}
.tabs{display:flex;gap:8px;overflow:auto;margin:18px 0}
.tab{white-space:nowrap;padding:10px 14px;border-radius:999px;background:#fff;border:1px solid #e2e8f0;font-weight:900}
.tab.active{background:#2563eb;color:#fff}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:22px;overflow:hidden;box-shadow:0 12px 30px rgba(15,23,42,.06)}
.thumb{height:160px;background:linear-gradient(135deg,#dbeafe,#fce7f3,#dcfce7);display:flex;align-items:center;justify-content:center;font-size:42px}
.body{padding:16px}
.badge{display:inline-block;padding:5px 9px;border-radius:999px;background:#eff6ff;color:#2563eb;font-size:12px;font-weight:900;margin-bottom:8px}
.title{font-size:17px;font-weight:950;margin-bottom:6px}
.desc{font-size:13px;color:#64748b;min-height:42px}
.price{font-size:21px;font-weight:950;margin:12px 0;color:#0f172a}
.store{font-size:12px;color:#64748b;margin-bottom:12px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.panel{background:#fff;border:1px solid #e2e8f0;border-radius:24px;padding:20px;margin:18px 0;box-shadow:0 12px 30px rgba(15,23,42,.05)}
.panel h2{font-size:24px;margin-bottom:14px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.input,.select,.textarea{width:100%;padding:13px;border:1px solid #cbd5e1;border-radius:14px;margin-bottom:10px}
.textarea{min-height:90px;resize:vertical}
.hidden{display:none!important}
.bottom{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:1180px;background:#fff;border-top:1px solid #e2e8f0;display:grid;grid-template-columns:repeat(5,1fr);z-index:100}
.bottom button{padding:10px 4px;background:#fff;color:#64748b;font-weight:900}
.bottom b{display:block;font-size:22px}
.bottom button.active{color:#2563eb}
.table{width:100%;border-collapse:collapse}
.table th,.table td{padding:12px;border-bottom:1px solid #e2e8f0;text-align:left;font-size:14px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:999;padding:18px}
.modal.show{display:flex}
.modal-box{background:#fff;border-radius:24px;max-width:520px;width:100%;padding:22px}
.notice{font-size:13px;color:#f97316;margin-top:8px}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}.form-grid{grid-template-columns:1fr}.search{max-width:none}.nav{flex-wrap:wrap;height:auto;padding:12px 16px}.thumb{height:130px}}
</style>
</head>
<body>

<header>
  <div class="nav">
    <div class="logo">TOOLMALL</div>
    <div class="search">
      <input id="searchInput" placeholder="상품, 서비스, 업체 검색">
      <button class="btn" onclick="renderProducts()">검색</button>
    </div>
    <button class="btn dark" onclick="showScreen('seller')">입점하기</button>
  </div>
</header>

<div class="wrap">

<section id="home" class="screen">
  <div class="hero">
    <h1>사업주가 직접 입점하고<br>고객이 바로 찾는 플랫폼</h1>
    <p>상품, 서비스, 상담형 상품까지 등록 가능한 입점형 마켓 MVP입니다.</p>
  </div>

  <div class="tabs" id="categoryTabs">
    <button class="tab active" onclick="setCategory('전체',this)">전체</button>
    <button class="tab" onclick="setCategory('마케팅',this)">마케팅</button>
    <button class="tab" onclick="setCategory('홈페이지',this)">홈페이지</button>
    <button class="tab" onclick="setCategory('앱/시스템',this)">앱/시스템</button>
    <button class="tab" onclick="setCategory('디자인',this)">디자인</button>
    <button class="tab" onclick="setCategory('교육/컨설팅',this)">교육/컨설팅</button>
  </div>

  <div class="grid" id="productGrid"></div>
</section>

<section id="seller" class="screen hidden">
  <div class="panel">
    <h2>사업주 입점 신청</h2>
    <div class="form-grid">
      <input id="storeName" class="input" placeholder="상호명">
      <input id="ownerName" class="input" placeholder="담당자명">
      <input id="storePhone" class="input" placeholder="연락처">
      <input id="storeCategory" class="input" placeholder="주 업종">
    </div>
    <textarea id="storeIntro" class="textarea" placeholder="업체 소개"></textarea>
    <button class="btn" onclick="registerStore()">입점 신청하기</button>
    <p class="notice">데모 버전에서는 브라우저에 저장됩니다. 실제 운영 시 DB/사업자 검수/정산 시스템이 필요합니다.</p>
  </div>

  <div class="panel">
    <h2>상품 / 서비스 등록</h2>
    <div class="form-grid">
      <input id="pTitle" class="input" placeholder="상품명">
      <input id="pPrice" type="number" class="input" placeholder="가격">
      <select id="pCategory" class="select">
        <option>마케팅</option>
        <option>홈페이지</option>
        <option>앱/시스템</option>
        <option>디자인</option>
        <option>교육/컨설팅</option>
      </select>
      <input id="pIcon" class="input" placeholder="아이콘 이모지 예: 🚀">
    </div>
    <textarea id="pDesc" class="textarea" placeholder="상품 설명"></textarea>
    <button class="btn" onclick="addProduct()">상품 등록하기</button>
  </div>

  <div class="panel">
    <h2>내 등록 상품</h2>
    <table class="table">
      <thead><tr><th>상품</th><th>가격</th><th>상태</th></tr></thead>
      <tbody id="myProductTable"></tbody>
    </table>
  </div>
</section>

<section id="cart" class="screen hidden">
  <div class="panel">
    <h2>장바구니</h2>
    <div id="cartList"></div>
    <button class="btn" onclick="checkout()">문의/주문 요청하기</button>
  </div>
</section>

<section id="orders" class="screen hidden">
  <div class="panel">
    <h2>문의 / 주문 요청 내역</h2>
    <table class="table">
      <thead><tr><th>상품</th><th>금액</th><th>상태</th></tr></thead>
      <tbody id="orderTable"></tbody>
    </table>
  </div>
</section>

<section id="admin" class="screen hidden">
  <div class="panel">
    <h2>관리자 데모</h2>
    <p>입점 업체, 상품, 주문 요청을 확인하는 관리자 화면입니다.</p>
  </div>

  <div class="panel">
    <h2>입점 업체</h2>
    <table class="table">
      <thead><tr><th>상호</th><th>담당자</th><th>연락처</th></tr></thead>
      <tbody id="adminStoreTable"></tbody>
    </table>
  </div>

  <div class="panel">
    <h2>전체 상품</h2>
    <table class="table">
      <thead><tr><th>상품</th><th>업체</th><th>가격</th></tr></thead>
      <tbody id="adminProductTable"></tbody>
    </table>
  </div>
</section>

</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <h2 id="modalTitle">상품명</h2>
    <p id="modalDesc"></p>
    <div class="price" id="modalPrice"></div>
    <p class="store" id="modalStore"></p>
    <div class="actions">
      <button class="btn" onclick="addToCartFromModal()">장바구니</button>
      <button class="btn dark" onclick="directInquiry()">바로 문의</button>
    </div>
    <button class="btn gray" style="margin-top:10px;width:100%" onclick="closeModal()">닫기</button>
  </div>
</div>

<nav class="bottom">
  <button class="active" onclick="showScreen('home',this)"><b>🏠</b>홈</button>
  <button onclick="showScreen('seller',this)"><b>🏢</b>입점</button>
  <button onclick="showScreen('cart',this)"><b>🛒</b>장바구니</button>
  <button onclick="showScreen('orders',this)"><b>📦</b>요청</button>
  <button onclick="showScreen('admin',this)"><b>⚙️</b>관리</button>
</nav>

<script>
const baseProducts=[
{id:1,title:"소상공인 홈페이지 제작",price:390000,category:"홈페이지",icon:"💻",store:"HVIRAL",desc:"회사 소개, 문의 동선, 검색 노출까지 고려한 홈페이지 제작 상품입니다."},
{id:2,title:"블로그 마케팅 패키지",price:250000,category:"마케팅",icon:"📝",store:"HVIRAL",desc:"검색 유입을 위한 블로그 콘텐츠 기획과 발행 패키지입니다."},
{id:3,title:"예약 앱 MVP 제작",price:890000,category:"앱/시스템",icon:"📱",store:"Toolware Lab",desc:"예약, 문의, 고객관리 기능을 포함한 간단한 앱 MVP 제작 상품입니다."},
{id:4,title:"상세페이지 디자인",price:180000,category:"디자인",icon:"🎨",store:"Design Partner",desc:"상품 판매에 필요한 상세페이지 디자인 제작 서비스입니다."},
{id:5,title:"마케팅 진단 컨설팅",price:120000,category:"교육/컨설팅",icon:"📊",store:"HVIRAL",desc:"현재 온라인 채널을 점검하고 개선 방향을 제안합니다."}
];

let currentCategory="전체";
let selectedProduct=null;

function get(key,def){return JSON.parse(localStorage.getItem(key)||JSON.stringify(def))}
function set(key,val){localStorage.setItem(key,JSON.stringify(val))}
function products(){return get("tm_products",baseProducts)}
function stores(){return get("tm_stores",[])}
function cart(){return get("tm_cart",[])}
function orders(){return get("tm_orders",[])}

function init(){
  if(!localStorage.getItem("tm_products")) set("tm_products",baseProducts);
  renderProducts();renderCart();renderOrders();renderAdmin();renderMyProducts();
}

function showScreen(id,btn){
  document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
  document.querySelectorAll(".bottom button").forEach(b=>b.classList.remove("active"));
  if(btn)btn.classList.add("active");
  renderProducts();renderCart();renderOrders();renderAdmin();renderMyProducts();
}

function setCategory(cat,btn){
  currentCategory=cat;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  renderProducts();
}

function renderProducts(){
  const q=document.getElementById("searchInput").value.trim().toLowerCase();
  const grid=document.getElementById("productGrid");
  grid.innerHTML="";
  products()
    .filter(p=>currentCategory==="전체"||p.category===currentCategory)
    .filter(p=>!q||p.title.toLowerCase().includes(q)||p.store.toLowerCase().includes(q)||p.desc.toLowerCase().includes(q))
    .forEach(p=>{
      const div=document.createElement("div");
      div.className="card";
      div.innerHTML=`
        <div class="thumb">${p.icon||"📦"}</div>
        <div class="body">
          <span class="badge">${p.category}</span>
          <div class="title">${p.title}</div>
          <div class="desc">${p.desc}</div>
          <div class="price">${Number(p.price).toLocaleString()}원</div>
          <div class="store">${p.store}</div>
          <div class="actions">
            <button class="btn" onclick="openProduct(${p.id})">상세</button>
            <button class="btn dark" onclick="addToCart(${p.id})">담기</button>
          </div>
        </div>`;
      grid.appendChild(div);
    });
}

function openProduct(id){
  selectedProduct=products().find(p=>p.id===id);
  document.getElementById("modalTitle").innerText=selectedProduct.title;
  document.getElementById("modalDesc").innerText=selectedProduct.desc;
  document.getElementById("modalPrice").innerText=Number(selectedProduct.price).toLocaleString()+"원";
  document.getElementById("modalStore").innerText=selectedProduct.store;
  document.getElementById("modal").classList.add("show");
}
function closeModal(){document.getElementById("modal").classList.remove("show")}
function addToCartFromModal(){addToCart(selectedProduct.id);closeModal()}
function directInquiry(){addOrder(selectedProduct);closeModal();alert("문의 요청이 접수되었습니다.")}

function addToCart(id){
  const p=products().find(x=>x.id===id);
  const c=cart();c.push(p);set("tm_cart",c);
  renderCart();alert("장바구니에 담았습니다.");
}
function renderCart(){
  const list=document.getElementById("cartList");
  const c=cart();
  if(!c.length){list.innerHTML="<p>장바구니가 비어 있습니다.</p>";return}
  list.innerHTML=c.map((p,i)=>`
    <div class="panel">
      <b>${p.title}</b><br>${Number(p.price).toLocaleString()}원 · ${p.store}
      <button class="btn gray" style="margin-top:10px" onclick="removeCart(${i})">삭제</button>
    </div>`).join("");
}
function removeCart(i){const c=cart();c.splice(i,1);set("tm_cart",c);renderCart()}
function checkout(){
  const c=cart();
  if(!c.length){alert("장바구니가 비어 있습니다.");return}
  c.forEach(addOrder);
  set("tm_cart",[]);
  renderCart();renderOrders();
  alert("문의/주문 요청이 접수되었습니다.");
}
function addOrder(p){
  const o=orders();
  o.unshift({title:p.title,price:p.price,store:p.store,status:"접수",date:new Date().toLocaleString()});
  set("tm_orders",o);
}
function renderOrders(){
  const body=document.getElementById("orderTable");
  body.innerHTML=orders().map(o=>`<tr><td>${o.title}<br><small>${o.store}</small></td><td>${Number(o.price).toLocaleString()}원</td><td>${o.status}</td></tr>`).join("")||"<tr><td colspan='3'>요청 내역이 없습니다.</td></tr>";
}

function registerStore(){
  const s={
    name:document.getElementById("storeName").value||"무명 업체",
    owner:document.getElementById("ownerName").value||"-",
    phone:document.getElementById("storePhone").value||"-",
    category:document.getElementById("storeCategory").value||"-",
    intro:document.getElementById("storeIntro").value||""
  };
  const arr=stores();arr.unshift(s);set("tm_stores",arr);
  alert("입점 신청이 저장되었습니다.");
  renderAdmin();
}

function addProduct(){
  const title=document.getElementById("pTitle").value;
  if(!title){alert("상품명을 입력하세요.");return}
  const storeArr=stores();
  const p={
    id:Date.now(),
    title,
    price:Number(document.getElementById("pPrice").value||0),
    category:document.getElementById("pCategory").value,
    icon:document.getElementById("pIcon").value||"📦",
    desc:document.getElementById("pDesc").value||"등록된 상품 설명입니다.",
    store:storeArr[0]?.name||"입점 사업주"
  };
  const arr=products();arr.unshift(p);set("tm_products",arr);
  alert("상품이 등록되었습니다.");
  renderProducts();renderMyProducts();renderAdmin();
}

function renderMyProducts(){
  const body=document.getElementById("myProductTable");
  if(!body)return;
  const mine=products().filter(p=>p.store==="입점 사업주"||stores().some(s=>s.name===p.store));
  body.innerHTML=mine.map(p=>`<tr><td>${p.title}</td><td>${Number(p.price).toLocaleString()}원</td><td>노출중</td></tr>`).join("")||"<tr><td colspan='3'>등록 상품이 없습니다.</td></tr>";
}

function renderAdmin(){
  document.getElementById("adminStoreTable").innerHTML=stores().map(s=>`<tr><td>${s.name}</td><td>${s.owner}</td><td>${s.phone}</td></tr>`).join("")||"<tr><td colspan='3'>입점 업체 없음</td></tr>";
  document.getElementById("adminProductTable").innerHTML=products().map(p=>`<tr><td>${p.title}</td><td>${p.store}</td><td>${Number(p.price).toLocaleString()}원</td></tr>`).join("");
}
init();
</script>

</body>
</html>
